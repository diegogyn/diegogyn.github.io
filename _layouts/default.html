<!DOCTYPE html>
<html lang="{{ page.lang | default: 'pt-BR' }}" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>

    <meta name="description" content="{{ site.description }}">
    <meta name="author" content="{{ site.author }}">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet" />

    <style>
        /* Utilitários gerais */
        .gradient-text {
            background: linear-gradient(90deg, #3b82f6, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            padding-bottom: 0.15em;
            display: inline-block;
        }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover {
            transform: translateY(-5px);
            border-color: #3b82f6;
            box-shadow: 0 10px 30px -10px rgba(59, 130, 246, 0.3);
        }

        /* ── NAVBAR ─────────────────────────────────── */
        .nav-link { color:#d1d5db; text-decoration:none; transition:color .2s; }
        .nav-link:hover { color:#60a5fa; }
        .nav-flag {
            display:inline-flex; align-items:center; gap:.5rem;
            background:#1f2937; border:1px solid #374151;
            padding:.3rem .75rem; border-radius:999px;
            color:#d1d5db; text-decoration:none; font-size:.8rem;
            transition:background .2s;
        }
        .nav-flag:hover { background:#374151; }

        /* ── POST CONTENT ───────────────────────────── */
        .post-content { line-height: 1.85; color: #d1d5db; }
        .post-content p { margin-top: 0; margin-bottom: 1.4rem; }
        .post-content h1,
        .post-content h2,
        .post-content h3,
        .post-content h4 {
            color: #ffffff; font-weight: 700;
            line-height: 1.3; margin-top: 2.5rem; margin-bottom: 1rem;
        }
        .post-content h1 { font-size: 2rem; }
        .post-content h2 { font-size: 1.5rem; border-bottom: 1px solid #1f2937; padding-bottom: .4rem; }
        .post-content h3 { font-size: 1.2rem; color: #93c5fd; }
        .post-content h4 { font-size: 1rem;   color: #93c5fd; }
        .post-content strong { color: #ffffff; font-weight: 600; }
        .post-content em { color: #e5e7eb; font-style: italic; }
        .post-content a { color: #60a5fa; text-decoration: none; }
        .post-content a:hover { text-decoration: underline; }
        .post-content ul, .post-content ol { margin-bottom: 1.4rem; padding-left: 1.6rem; }
        .post-content ul { list-style-type: disc; }
        .post-content ol { list-style-type: decimal; }
        .post-content li { margin-bottom: .4rem; color: #d1d5db; }
        .post-content li::marker { color: #3b82f6; }
        .post-content code {
            background: #111827; color: #60a5fa;
            padding: .15em .45em; border-radius: 4px;
            font-size: .875em; font-family: 'Courier New', monospace;
        }
        .post-content pre {
            background: #0f172a; border: 1px solid #1e293b;
            border-radius: .75rem; padding: 1.25rem 1.5rem;
            overflow-x: auto; margin-bottom: 1.6rem; margin-top: .5rem;
        }
        .post-content pre code {
            background: transparent; color: #93c5fd;
            padding: 0; font-size: .9em; border-radius: 0;
        }
        .post-content blockquote {
            border-left: 3px solid #3b82f6; background: #111827;
            color: #9ca3af; padding: .75rem 1.25rem;
            border-radius: 0 .5rem .5rem 0; margin: 1.5rem 0; font-style: italic;
        }
        .post-content blockquote p { margin-bottom: 0; }
        .post-content hr { border: none; border-top: 1px solid #1f2937; margin: 2.5rem 0; }
        .post-content table { width: 100%; border-collapse: collapse; margin-bottom: 1.5rem; font-size: .9rem; }
        .post-content th { background: #1f2937; color: #fff; font-weight: 600; padding: .6rem 1rem; text-align: left; border: 1px solid #374151; }
        .post-content td { padding: .6rem 1rem; border: 1px solid #1f2937; color: #d1d5db; }
        .post-content tr:nth-child(even) td { background: #0f172a; }
    </style>
</head>

<body class="bg-gray-950 text-gray-200 font-sans leading-relaxed selection:bg-blue-500 selection:text-white">

<nav id="navbar" class="fixed top-0 left-0 w-full z-[9999] bg-gray-950/90 backdrop-blur-md border-b border-gray-800 transition-shadow duration-300 transform-gpu">
        <div class="max-w-[72rem] mx-auto px-6 py-4 flex justify-between items-center">

            <a href="{{ site.url }}/" class="nav-link text-xl font-bold tracking-widest text-gray-200">DM.</a>

            <div id="nav-desktop" class="hidden md:flex gap-8 text-sm font-medium items-center">
                {% if page.lang == 'en' %}
                    <a href="/en.html#sobre"      class="nav-link">About</a>
                    <a href="/en.html#experiencia" class="nav-link">Public Sector</a>
                    <a href="/en.html#stack"       class="nav-link">Stack</a>
                    <a href="/blog.html"           class="nav-link text-blue-400">Blog</a>
                    <a href="/" class="nav-flag"><img src="https://flagcdn.com/w20/br.png" alt="PT" class="w-5"> PT</a>
                {% else %}
                    <a href="/#sobre"      class="nav-link">Sobre</a>
                    <a href="/#experiencia" class="nav-link">Setor Público</a>
                    <a href="/#stack"       class="nav-link">Stack</a>
                    <a href="/blog.html"   class="nav-link text-blue-400">Blog</a>
                    <a href="/en.html" class="nav-flag"><img src="https://flagcdn.com/w20/us.png" alt="EN" class="w-5"> EN</a>
                {% endif %}
            </div>

            <button id="menu-toggle" aria-label="Abrir menu" class="flex md:hidden flex-col justify-center items-center gap-[5px] w-9 h-9 bg-transparent border-none cursor-pointer p-1">
                <span class="hline block w-[22px] h-[2px] bg-gray-300 rounded-sm transition-all duration-300"></span>
                <span class="hline block w-[22px] h-[2px] bg-gray-300 rounded-sm transition-all duration-300"></span>
                <span class="hline block w-[22px] h-[2px] bg-gray-300 rounded-sm transition-all duration-300"></span>
            </button>
        </div>

        <div id="mobile-menu" class="md:!hidden hidden flex-col gap-4 px-6 pt-4 pb-6 border-t border-gray-800 text-[0.95rem] font-medium bg-gray-950/95 backdrop-blur-md">
            {% if page.lang == 'en' %}
                <a href="/en.html#sobre"       class="nav-link">About</a>
                <a href="/en.html#experiencia"  class="nav-link">Public Sector</a>
                <a href="/en.html#stack"        class="nav-link">Stack</a>
                <a href="/blog.html"            class="text-blue-400 no-underline">Blog</a>
                <a href="/" class="nav-flag self-start"><img src="https://flagcdn.com/w20/br.png" alt="PT" class="w-5"> PT</a>
            {% else %}
                <a href="/#sobre"       class="nav-link">Sobre</a>
                <a href="/#experiencia"  class="nav-link">Setor Público</a>
                <a href="/#stack"        class="nav-link">Stack</a>
                <a href="/blog.html"     class="text-blue-400 no-underline">Blog</a>
                <a href="/en.html" class="nav-flag self-start"><img src="https://flagcdn.com/w20/us.png" alt="EN" class="w-5"> EN</a>
            {% endif %}
        </div>
    </nav>

    <main>
        {{ content }}
    </main>

    <footer class="bg-gray-950 border-t border-gray-900 text-gray-500 text-center py-8 text-sm mt-10">
        <p>© 2026 Diego Martins</p>
    </footer>

    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800, once: true, offset: 50, startEvent: "load", disableMutationObserver: false });

        // Sombra ao rolar
        window.addEventListener("scroll", function () {
            document.getElementById("navbar").style.boxShadow =
                window.scrollY > 50 ? "0 4px 24px rgba(0,0,0,.5)" : "";
        });

        // Hamburguer
        const toggle     = document.getElementById("menu-toggle");
        const mobileMenu = document.getElementById("mobile-menu");
        const lines      = document.querySelectorAll(".hline");
        let isOpen = false;

        toggle.addEventListener("click", function () {
            isOpen = !isOpen;
            if (isOpen) {
                mobileMenu.style.display = "flex";
                lines[0].style.transform = "translateY(7px) rotate(45deg)";
                lines[1].style.opacity   = "0";
                lines[2].style.transform = "translateY(-7px) rotate(-45deg)";
            } else {
                mobileMenu.style.display = "none";
                lines[0].style.transform = "";
                lines[1].style.opacity   = "";
                lines[2].style.transform = "";
            }
        });

        // Fecha ao clicar em link
        mobileMenu.querySelectorAll("a").forEach(function(link) {
            link.addEventListener("click", function () {
                isOpen = false;
                mobileMenu.style.display = "none";
                lines[0].style.transform = "";
                lines[1].style.opacity   = "";
                lines[2].style.transform = "";
            });
        });

        // Evita que o menu fique "aberto" visualmente ao rotacionar a tela do celular para modo paisagem/desktop
        window.addEventListener("resize", function() {
            if (window.innerWidth >= 768 && isOpen) {
                isOpen = false;
                mobileMenu.style.display = "none";
                lines[0].style.transform = "";
                lines[1].style.opacity   = "";
                lines[2].style.transform = "";
            }
        });
    </script>
</body>
</html>
