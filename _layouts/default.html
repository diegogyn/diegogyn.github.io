<!DOCTYPE html>
<html lang="{{ page.lang | default: 'pt-BR' }}" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <meta name="author" content="{{ site.author }}">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet" />

    <style>
        /* ── GERAL ──────────────────────────────────── */
        .gradient-text {
            background: linear-gradient(90deg, #3b82f6, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            padding-bottom: 0.15em;
            display: inline-block;
        }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover {
            transform: translateY(-5px);
            border-color: #3b82f6;
            box-shadow: 0 10px 30px -10px rgba(59,130,246,0.3);
        }

        /* ── NAVBAR ─────────────────────────────────── */
        /*
         * A navbar usa transform:translateZ(0) para forçar um contexto
         * de composição de GPU próprio, garantindo que ela sempre fique
         * acima de qualquer elemento com transform/opacity do AOS.
         */
        #navbar {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            z-index: 9999;
            transform: translateZ(0);          /* contexto GPU próprio */
            -webkit-transform: translateZ(0);
            background: rgba(3, 7, 18, 0.90);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid #1f2937;
            transition: box-shadow 0.3s;
        }
        #navbar .inner {
            max-width: 72rem;
            margin: 0 auto;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav-logo {
            font-size: 1.2rem; font-weight: 700;
            letter-spacing: .1em; color: #e5e7eb;
            text-decoration: none; transition: color .2s;
        }
        .nav-logo:hover { color: #60a5fa; }
        .nav-link { color: #d1d5db; text-decoration: none; transition: color .2s; font-size: .875rem; font-weight: 500; }
        .nav-link:hover { color: #60a5fa; }
        .nav-link-active { color: #60a5fa; }
        .nav-flag {
            display: inline-flex; align-items: center; gap: .4rem;
            background: #1f2937; border: 1px solid #374151;
            padding: .25rem .7rem; border-radius: 999px;
            color: #d1d5db; text-decoration: none; font-size: .8rem; font-weight: 500;
            transition: background .2s;
        }
        .nav-flag img { width: 1rem; height: .75rem; border-radius: 2px; }
        .nav-flag:hover { background: #374151; }

        /* Desktop: mostra links, esconde hamburguer */
        #nav-links   { display: none; }
        #nav-toggle  { display: flex; }
        #nav-mobile  { display: none; }

        @media (min-width: 768px) {
            #nav-links  { display: flex; align-items: center; gap: 2rem; }
            #nav-toggle { display: none; }
            #nav-mobile { display: none !important; }
        }

        /* Hamburguer */
        #nav-toggle {
            flex-direction: column; justify-content: center; align-items: center;
            gap: 5px; width: 36px; height: 36px;
            background: none; border: none; cursor: pointer; padding: 4px;
        }
        .hline {
            display: block; width: 22px; height: 2px;
            background: #d1d5db; border-radius: 2px;
            transition: transform .3s ease, opacity .3s ease;
        }

        /* Mobile dropdown */
        #nav-mobile {
            flex-direction: column; gap: 1rem;
            padding: 1rem 1.5rem 1.25rem;
            border-top: 1px solid #1f2937;
        }

        /* ── POST CONTENT ───────────────────────────── */
        .post-content { line-height: 1.85; color: #d1d5db; }
        .post-content p { margin-top: 0; margin-bottom: 1.4rem; }
        .post-content h1, .post-content h2,
        .post-content h3, .post-content h4 {
            color: #fff; font-weight: 700;
            line-height: 1.3; margin-top: 2.5rem; margin-bottom: 1rem;
        }
        .post-content h1 { font-size: 2rem; }
        .post-content h2 { font-size: 1.5rem; border-bottom: 1px solid #1f2937; padding-bottom: .4rem; }
        .post-content h3 { font-size: 1.2rem; color: #93c5fd; }
        .post-content h4 { font-size: 1rem;   color: #93c5fd; }
        .post-content strong { color: #fff; font-weight: 600; }
        .post-content em { color: #e5e7eb; font-style: italic; }
        .post-content a { color: #60a5fa; text-decoration: none; }
        .post-content a:hover { text-decoration: underline; }
        .post-content ul, .post-content ol { margin-bottom: 1.4rem; padding-left: 1.6rem; }
        .post-content ul { list-style-type: disc; }
        .post-content ol { list-style-type: decimal; }
        .post-content li { margin-bottom: .4rem; color: #d1d5db; }
        .post-content li::marker { color: #3b82f6; }
        .post-content code {
            background: #111827; color: #60a5fa;
            padding: .15em .45em; border-radius: 4px;
            font-size: .875em; font-family: 'Courier New', monospace;
        }
        .post-content pre {
            background: #0f172a; border: 1px solid #1e293b;
            border-radius: .75rem; padding: 1.25rem 1.5rem;
            overflow-x: auto; margin-bottom: 1.6rem; margin-top: .5rem;
        }
        .post-content pre code {
            background: transparent; color: #93c5fd;
            padding: 0; font-size: .9em;
        }
        .post-content blockquote {
            border-left: 3px solid #3b82f6; background: #111827;
            color: #9ca3af; padding: .75rem 1.25rem;
            border-radius: 0 .5rem .5rem 0; margin: 1.5rem 0; font-style: italic;
        }
        .post-content blockquote p { margin-bottom: 0; }
        .post-content hr { border: none; border-top: 1px solid #1f2937; margin: 2.5rem 0; }
        .post-content table { width: 100%; border-collapse: collapse; margin-bottom: 1.5rem; font-size: .9rem; }
        .post-content th { background: #1f2937; color: #fff; font-weight: 600; padding: .6rem 1rem; text-align: left; border: 1px solid #374151; }
        .post-content td { padding: .6rem 1rem; border: 1px solid #1f2937; color: #d1d5db; }
        .post-content tr:nth-child(even) td { background: #0f172a; }
    </style>
</head>

<body class="bg-gray-950 text-gray-200 font-sans leading-relaxed selection:bg-blue-500 selection:text-white">

    <nav id="navbar">
        <div class="inner">
            <a href="{{ site.url }}/" class="nav-logo">DM.</a>

            <!-- Links desktop -->
            <div id="nav-links">
                {% if page.lang == 'en' %}
                    <a href="/en.html#sobre"       class="nav-link">About</a>
                    <a href="/en.html#experiencia" class="nav-link">Public Sector</a>
                    <a href="/en.html#stack"       class="nav-link">Stack</a>
                    <a href="/blog.html"           class="nav-link nav-link-active">Blog</a>
                    <a href="/" class="nav-flag"><img src="https://flagcdn.com/w20/br.png" alt="PT"> PT</a>
                {% else %}
                    <a href="/#sobre"       class="nav-link">Sobre</a>
                    <a href="/#experiencia" class="nav-link">Setor Público</a>
                    <a href="/#stack"       class="nav-link">Stack</a>
                    <a href="/blog.html"    class="nav-link nav-link-active">Blog</a>
                    <a href="/en.html" class="nav-flag"><img src="https://flagcdn.com/w20/us.png" alt="EN"> EN</a>
                {% endif %}
            </div>

            <!-- Botão hamburguer -->
            <button id="nav-toggle" aria-label="Abrir menu">
                <span class="hline"></span>
                <span class="hline"></span>
                <span class="hline"></span>
            </button>
        </div>

        <!-- Menu mobile -->
        <div id="nav-mobile">
            {% if page.lang == 'en' %}
                <a href="/en.html#sobre"       class="nav-link">About</a>
                <a href="/en.html#experiencia" class="nav-link">Public Sector</a>
                <a href="/en.html#stack"       class="nav-link">Stack</a>
                <a href="/blog.html"           class="nav-link-active" style="text-decoration:none;">Blog</a>
                <a href="/" class="nav-flag" style="align-self:flex-start;"><img src="https://flagcdn.com/w20/br.png" alt="PT"> PT</a>
            {% else %}
                <a href="/#sobre"       class="nav-link">Sobre</a>
                <a href="/#experiencia" class="nav-link">Setor Público</a>
                <a href="/#stack"       class="nav-link">Stack</a>
                <a href="/blog.html"    class="nav-link-active" style="text-decoration:none;">Blog</a>
                <a href="/en.html" class="nav-flag" style="align-self:flex-start;"><img src="https://flagcdn.com/w20/us.png" alt="EN"> EN</a>
            {% endif %}
        </div>
    </nav>

    <main>
        {{ content }}
    </main>

    <footer class="bg-gray-950 border-t border-gray-900 text-gray-500 text-center py-8 text-sm mt-10">
        <p>© 2026 Diego Martins</p>
    </footer>

    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800, once: true, offset: 80 });

        // Sombra ao rolar
        window.addEventListener('scroll', function () {
            document.getElementById('navbar').style.boxShadow =
                window.scrollY > 50 ? '0 4px 24px rgba(0,0,0,.6)' : '';
        });

        // Hamburguer
        var toggle  = document.getElementById('nav-toggle');
        var mobile  = document.getElementById('nav-mobile');
        var lines   = document.querySelectorAll('.hline');
        var open    = false;

        function openMenu() {
            open = true;
            mobile.style.display = 'flex';
            lines[0].style.transform = 'translateY(7px) rotate(45deg)';
            lines[1].style.opacity   = '0';
            lines[2].style.transform = 'translateY(-7px) rotate(-45deg)';
        }
        function closeMenu() {
            open = false;
            mobile.style.display = 'none';
            lines[0].style.transform = '';
            lines[1].style.opacity   = '';
            lines[2].style.transform = '';
        }

        toggle.addEventListener('click', function () { open ? closeMenu() : openMenu(); });

        mobile.querySelectorAll('a').forEach(function (a) {
            a.addEventListener('click', closeMenu);
        });
    </script>
</body>
</html>
