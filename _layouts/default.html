<!DOCTYPE html>
<html lang="{{ page.lang | default: 'pt-BR' }}" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <meta name="author" content="{{ site.author }}">

    <!-- Tailwind (somente utilitários) -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet" />

    <!-- Nosso CSS de tema (substitui o dark mode do Tailwind) -->
    <link rel="stylesheet" href="/assets/css/theme.css">

    <style>
        .gradient-text {
            background: linear-gradient(90deg, #3b82f6, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            padding-bottom: 0.15em;
            display: inline-block;
        }
    </style>
</head>

<body class="font-sans leading-relaxed selection:bg-blue-500 selection:text-white flex flex-col min-h-screen">

    <!-- NAVBAR -->
    <nav id="navbar" class="navbar fixed inset-x-0 top-0 w-full h-20 z-[99999] backdrop-blur-md border-b transition-shadow duration-300">
        <div class="w-full max-w-6xl mx-auto px-6 h-full flex justify-between items-center">
            <a href="{{ site.url }}/" class="text-xl font-bold tracking-widest text-gray-900 dark:text-gray-200 hover:text-blue-600 transition">DM.</a>

            <div class="hidden md:flex items-center gap-8 text-sm font-medium">
                {% if page.lang == 'en' %}
                    <a href="/en.html#sobre" class="text-gray-700 dark:text-gray-300 hover:text-blue-600 transition">About</a>
                    <a href="/en.html#experiencia" class="text-gray-700 dark:text-gray-300 hover:text-blue-600 transition">Public Sector</a>
                    <a href="/en.html#stack" class="text-gray-700 dark:text-gray-300 hover:text-blue-600 transition">Stack</a>
                    <a href="/blog.html" class="transition {% if page.url contains '/blog' or page.layout == 'post' %}text-blue-600{% else %}text-gray-700 dark:text-gray-300 hover:text-blue-600{% endif %}">Blog</a>
                    <button class="theme-toggle flex items-center justify-center p-2 text-gray-700 dark:text-gray-300 hover:text-blue-600 transition" aria-label="Alternar tema">
                        <i class="sun-icon fas fa-sun text-xl"></i>
                        <i class="moon-icon fas fa-moon text-xl hidden"></i>
                    </button>
                    <a href="/" class="flex items-center gap-2 bg-gray-100 hover:bg-gray-200 border border-gray-200 px-3 py-1 rounded-full text-gray-700 transition">
                        <img src="https://flagcdn.com/w20/br.png" alt="PT" class="w-4 h-3 rounded-sm object-cover"> PT
                    </a>
                {% else %}
                    <a href="/#sobre" class="text-gray-700 hover:text-blue-600 transition">Sobre</a>
                    <a href="/#experiencia" class="text-gray-700 hover:text-blue-600 transition">Setor Público</a>
                    <a href="/#stack" class="text-gray-700 hover:text-blue-600 transition">Stack</a>
                    <a href="/blog.html" class="transition {% if page.url contains '/blog' or page.layout == 'post' %}text-blue-600{% else %}text-gray-700 hover:text-blue-600{% endif %}">Blog</a>
                    <button class="theme-toggle flex items-center justify-center p-2 text-gray-700 hover:text-blue-600 transition" aria-label="Alternar tema">
                        <i class="sun-icon fas fa-sun text-xl"></i>
                        <i class="moon-icon fas fa-moon text-xl hidden"></i>
                    </button>
                    <a href="/en.html" class="flex items-center gap-2 bg-gray-100 hover:bg-gray-200 border border-gray-200 px-3 py-1 rounded-full text-gray-700 transition">
                        <img src="https://flagcdn.com/w20/us.png" alt="EN" class="w-4 h-3 rounded-sm object-cover"> EN
                    </a>
                {% endif %}
            </div>

            <button id="nav-toggle" class="md:hidden p-2 -mr-2 text-gray-700 hover:text-gray-900 focus:outline-none" aria-label="Menu">
                <svg id="icon-open" class="w-7 h-7 block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
                <svg id="icon-close" class="w-7 h-7 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>

        <div id="nav-mobile" class="hidden absolute top-full left-0 w-full bg-white border-b border-gray-200 shadow-2xl">
            <div class="flex flex-col gap-6 px-6 py-8 text-base font-medium">
                {% if page.lang == 'en' %}
                    <a href="/en.html#sobre" class="text-gray-700 hover:text-gray-900 mobile-link">About</a>
                    <a href="/en.html#experiencia" class="text-gray-700 hover:text-gray-900 mobile-link">Public Sector</a>
                    <a href="/en.html#stack" class="text-gray-700 hover:text-gray-900 mobile-link">Stack</a>
                    <a href="/blog.html" class="mobile-link {% if page.url contains '/blog' or page.layout == 'post' %}text-blue-600{% else %}text-gray-700 hover:text-gray-900{% endif %}">Blog</a>
                    <button class="theme-toggle mx-auto flex items-center justify-center p-3 border border-gray-200 rounded-full text-gray-700 hover:text-blue-600 transition" aria-label="Alternar tema">
                        <i class="sun-icon fas fa-sun text-xl"></i>
                        <i class="moon-icon fas fa-moon text-xl hidden"></i>
                    </button>
                    <a href="/" class="flex items-center gap-2 bg-gray-100 border border-gray-200 w-fit px-4 py-2 rounded-full text-gray-700 mt-2">
                        <img src="https://flagcdn.com/w20/br.png" alt="PT" class="w-4 h-3 rounded-sm object-cover"> PT
                    </a>
                {% else %}
                    <a href="/#sobre" class="text-gray-700 hover:text-gray-900 mobile-link">Sobre</a>
                    <a href="/#experiencia" class="text-gray-700 hover:text-gray-900 mobile-link">Setor Público</a>
                    <a href="/#stack" class="text-gray-700 hover:text-gray-900 mobile-link">Stack</a>
                    <a href="/blog.html" class="mobile-link {% if page.url contains '/blog' or page.layout == 'post' %}text-blue-600{% else %}text-gray-700 hover:text-gray-900{% endif %}">Blog</a>
                    <button class="theme-toggle mx-auto flex items-center justify-center p-3 border border-gray-200 rounded-full text-gray-700 hover:text-blue-600 transition" aria-label="Alternar tema">
                        <i class="sun-icon fas fa-sun text-xl"></i>
                        <i class="moon-icon fas fa-moon text-xl hidden"></i>
                    </button>
                    <a href="/en.html" class="flex items-center gap-2 bg-gray-100 border border-gray-200 w-fit px-4 py-2 rounded-full text-gray-700 mt-2">
                        <img src="https://flagcdn.com/w20/us.png" alt="EN" class="w-4 h-3 rounded-sm object-cover"> EN
                    </a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="flex-grow w-full mt-20">
        {{ content }}
    </main>

    <footer class="bg-white border-t border-gray-100 text-gray-500 text-center py-8 text-sm mt-auto">
        <p>© 2026 Diego Martins</p>
    </footer>

    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            AOS.init({ duration: 800, once: true, offset: 50 });

            const nav = document.getElementById('navbar');
            const toggle = document.getElementById('nav-toggle');
            const mobileMenu = document.getElementById('nav-mobile');
            const iconOpen = document.getElementById('icon-open');
            const iconClose = document.getElementById('icon-close');
            const mobileLinks = document.querySelectorAll('.mobile-link');
            
            let isOpen = false;

            function toggleMenu() {
                isOpen = !isOpen;
                if (isOpen) {
                    mobileMenu.classList.remove('hidden');
                    iconOpen.classList.add('hidden');
                    iconClose.classList.remove('hidden');
                } else {
                    mobileMenu.classList.add('hidden');
                    iconOpen.classList.remove('hidden');
                    iconClose.classList.add('hidden');
                }
            }

            toggle.addEventListener('click', toggleMenu);
            mobileLinks.forEach(link => link.addEventListener('click', () => { if (isOpen) toggleMenu(); }));

            window.addEventListener('scroll', () => {
                if (window.scrollY > 10) {
                    nav.classList.add('shadow-lg', 'shadow-blue-900/10');
                } else {
                    nav.classList.remove('shadow-lg', 'shadow-blue-900/10');
                }
            });

            window.addEventListener('resize', () => {
                if (window.innerWidth >= 768 && isOpen) toggleMenu();
            });

            // ==================== THEME TOGGLE ====================
            const themeToggles = document.querySelectorAll('.theme-toggle');
            const htmlElement = document.documentElement;

            function setTheme(theme) {
                if (theme === 'dark') {
                    htmlElement.classList.add('dark');
                } else {
                    htmlElement.classList.remove('dark');
                }
                localStorage.setItem('theme', theme);

                // Atualiza ícones
                themeToggles.forEach(btn => {
                    const sun = btn.querySelector('.sun-icon');
                    const moon = btn.querySelector('.moon-icon');
                    if (sun && moon) {
                        if (theme === 'dark') {
                            sun.classList.add('hidden');
                            moon.classList.remove('hidden');
                        } else {
                            sun.classList.remove('hidden');
                            moon.classList.add('hidden');
                        }
                    }
                });
            }

            let currentTheme = localStorage.getItem('theme');
            if (!currentTheme) {
                currentTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }
            setTheme(currentTheme);

            themeToggles.forEach(btn => {
                btn.addEventListener('click', () => {
                    const newTheme = htmlElement.classList.contains('dark') ? 'light' : 'dark';
                    setTheme(newTheme);
                });
            });
        });
    </script>
</body>
</html>
