<!DOCTYPE html>
<html lang="{{ page.lang | default: 'pt-BR' }}" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <meta name="author" content="{{ site.author }}">

    <!-- Plugin Tailwind Typography adicionado para resolver perfeitamente o design do Markdown -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet" />

    <style>
        .gradient-text {
            background: linear-gradient(90deg, #3b82f6, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            padding-bottom: 0.15em;
            display: inline-block;
        }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover {
            transform: translateY(-5px);
            border-color: #3b82f6;
            box-shadow: 0 10px 30px -10px rgba(59,130,246,0.3);
        }
    </style>
</head>

<body class="bg-gray-950 text-gray-200 font-sans leading-relaxed selection:bg-blue-500 selection:text-white flex flex-col min-h-screen">

    <!-- Navbar blindada: o translateZ e z-[9999] garantem que nenhuma animação passe por cima do menu -->
    <nav id="navbar" class="fixed top-0 left-0 w-full z-[9999] bg-gray-950/95 backdrop-blur-md border-b border-gray-800 transition-all duration-300 isolate" style="transform: translateZ(0); -webkit-transform: translateZ(0);">
        <div class="max-w-6xl mx-auto px-6 h-20 flex justify-between items-center relative z-50">
            <a href="{{ site.url }}/" class="text-xl font-bold tracking-widest text-gray-200 hover:text-blue-400 transition">DM.</a>

            <!-- Menu Desktop -->
            <div class="hidden md:flex items-center gap-8 text-sm font-medium">
                {% if page.lang == 'en' %}
                    <a href="/en.html#sobre" class="text-gray-300 hover:text-blue-400 transition">About</a>
                    <a href="/en.html#experiencia" class="text-gray-300 hover:text-blue-400 transition">Public Sector</a>
                    <a href="/en.html#stack" class="text-gray-300 hover:text-blue-400 transition">Stack</a>
                    <a href="/blog.html" class="transition {% if page.url contains '/blog' or page.layout == 'post' %}text-blue-400{% else %}text-gray-300 hover:text-blue-400{% endif %}">Blog</a>
                    <a href="/" class="flex items-center gap-2 bg-gray-800 hover:bg-gray-700 border border-gray-700 px-3 py-1.5 rounded-full text-gray-300 transition"><img src="https://flagcdn.com/w20/br.png" alt="PT" class="w-4 h-3 rounded-sm object-cover"> PT</a>
                {% else %}
                    <a href="/#sobre" class="text-gray-300 hover:text-blue-400 transition">Sobre</a>
                    <a href="/#experiencia" class="text-gray-300 hover:text-blue-400 transition">Setor Público</a>
                    <a href="/#stack" class="text-gray-300 hover:text-blue-400 transition">Stack</a>
                    <a href="/blog.html" class="transition {% if page.url contains '/blog' or page.layout == 'post' %}text-blue-400{% else %}text-gray-300 hover:text-blue-400{% endif %}">Blog</a>
                    <a href="/en.html" class="flex items-center gap-2 bg-gray-800 hover:bg-gray-700 border border-gray-700 px-3 py-1.5 rounded-full text-gray-300 transition"><img src="https://flagcdn.com/w20/us.png" alt="EN" class="w-4 h-3 rounded-sm object-cover"> EN</a>
                {% endif %}
            </div>

            <!-- Mobile Toggle Button -->
            <button id="nav-toggle" aria-label="Menu" aria-expanded="false" class="md:hidden flex flex-col justify-center items-center gap-1.5 w-10 h-10 p-2 focus:outline-none z-50">
                <span class="block w-6 h-[2px] bg-gray-300 rounded-full transition-all duration-300 origin-center"></span>
                <span class="block w-6 h-[2px] bg-gray-300 rounded-full transition-all duration-300 origin-center"></span>
                <span class="block w-6 h-[2px] bg-gray-300 rounded-full transition-all duration-300 origin-center"></span>
            </button>
        </div>

        <!-- Menu Mobile Overlay - Dropdown -->
        <div id="nav-mobile" class="hidden absolute top-full left-0 w-full bg-gray-950 border-b border-gray-800 shadow-2xl z-40">
            <div class="flex flex-col gap-6 px-6 py-8 text-base font-medium">
                {% if page.lang == 'en' %}
                    <a href="/en.html#sobre" class="text-gray-300 hover:text-white mobile-link">About</a>
                    <a href="/en.html#experiencia" class="text-gray-300 hover:text-white mobile-link">Public Sector</a>
                    <a href="/en.html#stack" class="text-gray-300 hover:text-white mobile-link">Stack</a>
                    <a href="/blog.html" class="mobile-link {% if page.url contains '/blog' or page.layout == 'post' %}text-blue-400{% else %}text-gray-300 hover:text-white{% endif %}">Blog</a>
                    <a href="/" class="flex items-center gap-2 bg-gray-800 border border-gray-700 w-fit px-4 py-2 rounded-full text-gray-300 mt-2"><img src="https://flagcdn.com/w20/br.png" alt="PT" class="w-4 h-3 rounded-sm object-cover"> PT</a>
                {% else %}
                    <a href="/#sobre" class="text-gray-300 hover:text-white mobile-link">Sobre</a>
                    <a href="/#experiencia" class="text-gray-300 hover:text-white mobile-link">Setor Público</a>
                    <a href="/#stack" class="text-gray-300 hover:text-white mobile-link">Stack</a>
                    <a href="/blog.html" class="mobile-link {% if page.url contains '/blog' or page.layout == 'post' %}text-blue-400{% else %}text-gray-300 hover:text-white{% endif %}">Blog</a>
                    <a href="/en.html" class="flex items-center gap-2 bg-gray-800 border border-gray-700 w-fit px-4 py-2 rounded-full text-gray-300 mt-2"><img src="https://flagcdn.com/w20/us.png" alt="EN" class="w-4 h-3 rounded-sm object-cover"> EN</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <!-- Conteúdo principal -->
    <main class="flex-grow w-full">
        {{ content }}
    </main>

    <footer class="bg-gray-950 border-t border-gray-900 text-gray-500 text-center py-8 text-sm mt-auto z-10">
        <p>© 2026 Diego Martins</p>
    </footer>

    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Inicializa Animações (mas os do Hero estão removidos nos arquivos abaixo para não bugar o menu)
            AOS.init({ duration: 800, once: true, offset: 50 });

            const nav = document.getElementById('navbar');
            const toggle = document.getElementById('nav-toggle');
            const mobileMenu = document.getElementById('nav-mobile');
            const lines = toggle.querySelectorAll('span');
            const mobileLinks = document.querySelectorAll('.mobile-link');
            let isOpen = false;

            // Lógica unificada para abrir e fechar o menu mobile
            function toggleMenu() {
                isOpen = !isOpen;
                toggle.setAttribute('aria-expanded', isOpen);
                
                if (isOpen) {
                    mobileMenu.classList.remove('hidden');
                    mobileMenu.classList.add('flex');
                    lines[0].classList.add('translate-y-2', 'rotate-45');
                    lines[1].classList.add('opacity-0');
                    lines[2].classList.add('-translate-y-2', '-rotate-45');
                } else {
                    mobileMenu.classList.add('hidden');
                    mobileMenu.classList.remove('flex');
                    lines[0].classList.remove('translate-y-2', 'rotate-45');
                    lines[1].classList.remove('opacity-0');
                    lines[2].classList.remove('-translate-y-2', '-rotate-45');
                }
            }

            // Click no botão
            toggle.addEventListener('click', toggleMenu);

            // Fecha automaticamente ao clicar nos links
            mobileLinks.forEach(link => {
                link.addEventListener('click', () => {
                    if (isOpen) toggleMenu();
                });
            });

            // Sombra da navbar na rolagem
            window.addEventListener('scroll', () => {
                if (window.scrollY > 50) {
                    nav.classList.add('shadow-lg', 'shadow-blue-900/10');
                } else {
                    nav.classList.remove('shadow-lg', 'shadow-blue-900/10');
                }
            });

            // Previne bug do menu se girar o tablet para Desktop
            window.addEventListener('resize', () => {
                if (window.innerWidth >= 768 && isOpen) {
                    toggleMenu();
                }
            });
        });
    </script>
</body>
</html>
