---
layout: default
---

<article class="max-w-4xl mx-auto px-6 py-32 min-h-[calc(100vh-10rem)]">
    <!-- Cabeçalho do Post -->
    <header class="mb-10 text-center" data-aos="fade-down">
        <h1 class="text-4xl md:text-5xl font-bold text-white mb-4">{{ page.title }}</h1>
        <p class="text-blue-400 font-medium flex items-center justify-center gap-2">
            <i class="fas fa-calendar-alt"></i> 
            {% if page.date %}
                {{ page.date | date: "%d/%m/%Y" }}
            {% endif %}
        </p>
    </header>

    <!-- Conteúdo Renderizado via Markdown. O Tailwind Typography resolve tudo via tag 'prose'. -->
    <div class="prose prose-invert prose-lg prose-blue max-w-none bg-gray-900 p-8 md:p-12 rounded-2xl border border-gray-800 shadow-xl" data-aos="fade-up">
        {{ content }}
    </div>
    
    <!-- Botão de Voltar -->
    <div class="mt-12 text-center" data-aos="fade-up" data-aos-delay="100">
        <a href="/blog.html" class="inline-flex items-center gap-2 text-gray-400 hover:text-blue-400 transition font-medium">
            <i class="fas fa-arrow-left"></i> 
            {% if page.lang == 'en' %}Back to Blog{% else %}Voltar para o Blog{% endif %}
        </a>
    </div>
</article>
