---
layout: default
---

<article class="max-w-4xl mx-auto px-6 py-16 min-h-[calc(100vh-5rem)]">
    <header class="mb-10 text-center" data-aos="fade-down">
        <h1 class="text-4xl md:text-5xl font-bold text-primary mb-4">{{ page.title }}</h1>
        <p class="text-blue-400 font-medium flex items-center justify-center gap-2">
            <i class="fas fa-calendar-alt"></i> 
            {% if page.date %}
                {{ page.date | date: "%d/%m/%Y" }}
            {% endif %}
        </p>
    </header>

    <div class="prose prose-gray max-w-none bg-card p-8 md:p-12 rounded-2xl border border-custom shadow-xl" data-aos="fade-up">
        {{ content }}
    </div>
    
    <section id="comentarios" class="mt-16 pt-16 border-t border-custom">
        <h2 class="text-3xl font-bold mb-8 text-center text-primary" data-aos="fade-up">Deixe seu <span class="text-blue-400">Comentário</span></h2>
        <div data-aos="fade-up" data-aos-delay="100">
            <script src="https://giscus.app/client.js"
                    data-repo="diegogyn/diegogyn.github.io"
                    data-repo-id="R_kgDOML7fgA"
                    data-category="Comments"
                    data-category-id="DIC_kwDOML7fgM4C4DB9"
                    data-mapping="pathname"
                    data-strict="0"
                    data-reactions-enabled="1"
                    data-emit-metadata="0"
                    data-input-position="bottom"
                    data-theme="dark"
                    data-lang="{% if page.lang == 'en' %}en{% else %}pt{% endif %}"
                    crossorigin="anonymous"
                    async>
            </script>
        </div>
    </section>

    <div class="mt-16 text-center" data-aos="fade-up">
        <a href="/blog.html" class="inline-flex items-center gap-2 text-secondary hover:text-blue-400 transition font-medium">
            <i class="fas fa-arrow-left"></i> 
            {% if page.lang == 'en' %}Back to Blog{% else %}Voltar para o Blog{% endif %}
        </a>
    </div>
</article>
