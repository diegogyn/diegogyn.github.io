---
layout: default
---
<article class="max-w-4xl mx-auto px-6 py-24 md:py-28 text-gray-300 min-h-screen">
    <h1 class="text-4xl md:text-5xl font-bold mb-4 text-white" data-aos="fade-up">{{ page.title }}</h1>
    <div class="w-16 h-1 bg-blue-400 mb-8 rounded"></div>
    <p class="text-blue-400 font-medium mb-10" data-aos="fade-up" data-aos-delay="100">Publicado em {{ page.date | date: "%d/%m/%Y" }}</p>
    
    <!-- O CONTEÚDO DO POST ENTRA AQUI -->
<div class="prose prose-invert prose-lg max-w-none prose-blue 
            prose-headings:text-white 
            prose-p:text-gray-300 
            prose-strong:text-white 
            prose-code:text-blue-400
            prose-pre:bg-gray-900
            prose-blockquote:border-blue-400
            prose-blockquote:text-gray-300">
        {{ content }}
    </div>
</article>

    <!-- GISCUS (Comentários) -->
    <section id="comentarios" class="max-w-4xl mx-auto py-20 px-6 border-t border-gray-800">
        <h2 class="text-3xl font-bold mb-8 text-center">💬 Deixe seu <span class="text-blue-400">Comentário</span></h2>
        <div data-aos="fade-up" data-aos-delay="100">
            <!-- COLOQUE SEU SCRIPT DO GISCUS AQUI -->
            <script src="https://giscus.app/client.js"
                    data-repo="diegogyn/diegogyn.github.io"
                    data-repo-id="R_kgDOML7fgA"
                    data-category="Comments"
                    data-category-id="DIC_kwDOML7fgM4C4DB9"
                    data-mapping="pathname"
                    data-strict="0"
                    data-reactions-enabled="1"
                    data-emit-metadata="0"
                    data-input-position="bottom"
                    data-theme="dark"
                    data-lang="pt"
                    crossorigin="anonymous"
                    async>
            </script>
        </div>
    </section>
